<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Petcare Spa</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css?v=70">
  <style>
    .err-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 20px;
    }
    .err-eyebrow {
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink);
    }
    .err-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 12rem);
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--text);
      opacity: 0.06;
      margin: -16px 0;
    }
    .err-heading {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .err-body {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 380px;
      line-height: 1.75;
    }
    .err-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
  </style>
  <meta name="theme-color" content="#C42D7F">
</head>
<body>

<main class="err-page">
  <p class="err-eyebrow">Error 404</p>
  <p class="err-code" aria-hidden="true">404</p>
  <h1 class="err-heading">Page not found</h1>
  <p class="err-body">The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
  <div class="err-actions">
    <a href="/" class="btn btn-primary">Back to home</a>
    <a href="/luxe-services" class="btn btn-outline">View services</a>
    <a href="/contact-us" class="btn btn-ghost">Contact us</a>
  </div>
</main>

</body>
</html>
